spring:
  application:
    name: cinema-seat-management

  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cinema_db}
    username: postgres
    password: Hello@3126
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# ── JWT ──
# Secret MUST be Base64-encoded (JwtTokenProvider uses Decoders.BASE64)
jwt:
  secret: ${JWT_SECRET:Y2luZW1hLXNlYXQtbWFuYWdlbWVudC1zZWNyZXQta2V5LXRoYXQtaXMtYXQtbGVhc3QtMjU2LWJpdHMtbG9uZw==}
  expiration-ms: 900000
  refresh-expiration-days: 7

# ── MQTT ──
mqtt:
  enable: false
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:cinema-backend}

# ── Booking ──
booking:
  reservation-ttl-minutes: 7
  expiry-check-interval-ms: 60000

# ── Server ──
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ── CORS ──
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Logging ──
logging:
  level:
    com.cinema.seatmanagement: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.springframework.web.socket: INFO
    org.springframework.integration.mqtt: INFO