spring:
  application:
    name: cinema-seat-management

  profiles:
    active: dev

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cinemadb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: CinemaHikariPool
      connection-test-query: SELECT 1

  # ── JPA ───────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate            # NEVER create/update — Flyway owns the schema
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
        jdbc:
          "[time_zone]": UTC
          "[batch_size]": 20
        "[order_inserts]": true
        "[order_updates]": true
        "[generate_statistics]": false

  # ── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  # ── Email (Template Method Pattern — AbstractEmailNotificationService) ────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

  # ── Thymeleaf (Email layout rendering) ───────────────────────────────────
  thymeleaf:
    check-template-location: false
    mode: HTML
    encoding: UTF-8

  # ── Cache ─────────────────────────────────────────────────────────────────
  # NOTE: spring.cache.caffeine.spec is intentionally omitted.
  # Per-cache TTLs and sizes are configured programmatically in CacheConfig
  # via registerCustomCache() — one spec per cache name ("movies", "showtimes",
  # "seat-maps"). A global spec here would override them and must not be set.
  cache:
    type: caffeine

  # ── Async / Task executor ─────────────────────────────────────────────────
  # These are Spring Boot's built-in task executor properties.
  # The dedicated thread pools (auditTaskExecutor, emailTaskExecutor) are
  # configured as @Bean in AsyncConfig; the pools below are the default
  # executor used by @Async calls without an explicit pool name.
  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 100
      thread-name-prefix: cinema-async-
    scheduling:
      pool:
        size: 3
      thread-name-prefix: cinema-scheduler-

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  # Secret MUST be Base64-encoded (minimum 256 bits for HS256).
  # The default below is for local development only — override via JWT_SECRET env var in prod.
  secret: ${JWT_SECRET:Y2luZW1hLXNlYXQtbWFuYWdlbWVudC1zZWNyZXQta2V5LXRoYXQtaXMtYXQtbGVhc3QtMjU2LWJpdHMtbG9uZw==}
  expiration-ms: 900000            # 15 minutes
  refresh-expiration-days: 7

# ── MQTT / IoT Bridge ─────────────────────────────────────────────────────────
mqtt:
  enabled: ${MQTT_ENABLED:false}
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:cinema-backend}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  qos: 1
  connection-timeout: 30
  keep-alive-interval: 60
  topics:
    seat-command: "cinema/screen/%s/seat/command"    # Backend → ESP32
    seat-status: "cinema/screen/+/seat/status"       # ESP32 → Backend
    heartbeat: "cinema/screen/+/heartbeat"            # ESP32 → Backend

# ── Booking ───────────────────────────────────────────────────────────────────
booking:
  reservation-ttl-minutes: 7
  expiry-check-interval-ms: 60000
  max-seats-per-booking: 10       # Enforced by @Size on CreateBookingRequest + AppConstants

# ── Showtime scheduler ────────────────────────────────────────────────────────
showtime:
  status-check-interval-ms: 60000  # How often ShowtimeServiceImpl.advanceShowtimeStatuses() runs

# ── Notification ──────────────────────────────────────────────────────────────
notification:
  email:
    enabled: ${EMAIL_ENABLED:true}
    from-name: "CinePlex Cinema"
    from-address: ${MAIL_USERNAME:noreply@cinema.com}

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  error:
    include-message: on_param
    include-binding-errors: on_param

# ── CORS ─────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    "[com.cinema.seatmanagement]": DEBUG
    "[org.springframework.security]": INFO
    "[org.hibernate.SQL]": WARN
    "[org.springframework.web.socket]": INFO
    "[org.springframework.integration.mqtt]": INFO
    "[org.springframework.mail]": DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cinema-seat-management.log