spring:
  application:
    name: cinema-seat-management

  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cinema_db}
    username: postgres
    password: Hello@3126
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# MQTT Configuration
mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:cinema-backend}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  topics:
    seat-command: cinema/screen/{screenId}/seat/command
    seat-status: cinema/screen/{screenId}/seat/status
    heartbeat: cinema/screen/{screenId}/heartbeat

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:aVeryLongSecretKeyThatIsAtLeast256BitsForHS256AlgorithmSecurity2026}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

# WebSocket
websocket:
  endpoint: /ws
  seat-topic: /topic/seats

# Booking
booking:
  reservation-ttl-minutes: 7

# Server
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging:
  level:
    com.cinema.seatmanagement: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN